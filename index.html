<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>REALITY.EXE — CORRUPTED</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --glitch-green: #00ff41;
    --glitch-red: #ff0040;
    --glitch-blue: #0047ff;
    --glitch-white: #e8e8e8;
    --bg: #000;
  }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    cursor: none;
  }

  #video {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0;
    pointer-events: none;
  }

  #glitch-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
  }

  #ui-layer {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 20;
    pointer-events: none;
  }

  .corner {
    position: absolute;
    width: 40px; height: 40px;
    opacity: 0.6;
  }
  .corner-tl { top: 16px; left: 16px; border-top: 1px solid var(--glitch-green); border-left: 1px solid var(--glitch-green); }
  .corner-tr { top: 16px; right: 16px; border-top: 1px solid var(--glitch-green); border-right: 1px solid var(--glitch-green); }
  .corner-bl { bottom: 16px; left: 16px; border-bottom: 1px solid var(--glitch-green); border-left: 1px solid var(--glitch-green); }
  .corner-br { bottom: 16px; right: 16px; border-bottom: 1px solid var(--glitch-green); border-right: 1px solid var(--glitch-green); }

  #status-bar {
    position: absolute;
    top: 24px; left: 50%;
    transform: translateX(-50%);
    font-family: 'VT323', monospace;
    font-size: 13px;
    color: var(--glitch-green);
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.7;
    animation: flicker 4s infinite;
  }

  #bottom-hud {
    position: absolute;
    bottom: 24px; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 0 24px;
    font-family: 'VT323', monospace;
    font-size: 11px;
    color: var(--glitch-green);
    letter-spacing: 2px;
    opacity: 0.5;
  }

  #coords {
    font-size: 10px;
    line-height: 1.6;
  }

  #signal-bars {
    display: flex; gap: 2px; align-items: flex-end;
  }
  .bar { width: 3px; background: var(--glitch-green); }

  #watermark {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'VT323', monospace;
    font-size: 11vw;
    color: var(--glitch-red);
    opacity: 0;
    letter-spacing: 8px;
    text-align: center;
    line-height: 1;
    pointer-events: none;
    text-shadow: 2px 0 var(--glitch-blue), -2px 0 var(--glitch-green);
    animation: watermark-pulse 7s infinite;
    white-space: nowrap;
  }

  #access-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    font-family: 'VT323', monospace;
    color: var(--glitch-green);
  }

  #access-title {
    font-size: clamp(32px, 8vw, 80px);
    letter-spacing: 8px;
    text-align: center;
    text-shadow: 3px 0 var(--glitch-red), -3px 0 var(--glitch-blue);
    animation: title-glitch 3s infinite;
    line-height: 1;
  }

  #access-sub {
    font-size: clamp(12px, 2.5vw, 18px);
    letter-spacing: 4px;
    color: #888;
    text-align: center;
    max-width: 400px;
    line-height: 1.8;
    padding: 0 24px;
  }

  #access-btn {
    font-family: 'VT323', monospace;
    font-size: clamp(16px, 3vw, 24px);
    letter-spacing: 6px;
    color: #000;
    background: var(--glitch-green);
    border: none;
    padding: 12px 40px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.1s;
    pointer-events: all;
    clip-path: polygon(4px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%);
  }
  #access-btn:hover {
    background: var(--glitch-red);
    color: #fff;
    text-shadow: 2px 0 var(--glitch-blue);
    transform: skewX(-2deg);
  }

  #boot-text {
    font-size: 11px;
    color: #333;
    letter-spacing: 2px;
    text-align: center;
    line-height: 2;
    animation: boot-scroll 10s linear infinite;
    padding: 0 24px;
  }

  #scanline-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    z-index: 30;
    pointer-events: none;
  }

  #vignette {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
    z-index: 29;
    pointer-events: none;
  }

  .hud-line {
    width: 80px;
    height: 1px;
    background: var(--glitch-green);
    opacity: 0.3;
    margin: 4px 0;
  }

  @keyframes flicker {
    0%, 94%, 96%, 98%, 100% { opacity: 0.7; }
    95%, 97% { opacity: 0.1; }
  }

  @keyframes watermark-pulse {
    0%, 85% { opacity: 0; }
    87% { opacity: 0.15; }
    89% { opacity: 0; }
    91% { opacity: 0.08; }
    93%, 100% { opacity: 0; }
  }

  @keyframes title-glitch {
    0%, 90% { text-shadow: 3px 0 var(--glitch-red), -3px 0 var(--glitch-blue); transform: none; }
    91% { text-shadow: -4px 0 var(--glitch-red), 4px 0 var(--glitch-blue); transform: skewX(5deg); }
    92% { text-shadow: 4px 0 var(--glitch-green), -4px 0 var(--glitch-red); transform: skewX(-3deg); }
    93% { text-shadow: 3px 0 var(--glitch-red), -3px 0 var(--glitch-blue); transform: none; }
  }

  @keyframes boot-scroll {
    0% { color: #222; }
    50% { color: #444; }
    100% { color: #222; }
  }
</style>
</head>
<body>

<div id="access-screen">
  <div id="access-title">REALITY.EXE</div>
  <div id="access-sub">// PERCEPTUAL OVERRIDE SYSTEM<br>// CAMERA ACCESS REQUIRED<br>// PROCEED WITH CAUTION</div>
  <button id="access-btn" onclick="initAR()">INITIALIZE ▶</button>
  <div id="boot-text">
    SYS::BOOT_SEQUENCE_LOADED<br>
    SHADER_CORE::READY<br>
    PERCEPTION_MODULE::STANDBY<br>
    GLITCH_ENGINE::v2.4.1<br>
    AWAITING_HOST_DEVICE...
  </div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="glitch-canvas"></canvas>

<div id="vignette"></div>
<div id="scanline-overlay"></div>

<div id="ui-layer">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
  <div id="status-bar">SYS::OVERRIDE — SIGNAL COMPROMISED</div>
  <div id="watermark">CORRUPTED</div>
  <div id="bottom-hud">
    <div id="coords">
      LAT: <span id="lat">---.---</span><br>
      LNG: <span id="lng">---.---</span><br>
      ALT: <span id="alt">---M</span>
    </div>
    <div id="signal-bars">
      <div class="bar" style="height:4px"></div>
      <div class="bar" style="height:8px"></div>
      <div class="bar" style="height:12px"></div>
      <div class="bar" style="height:6px; opacity:0.3"></div>
      <div class="bar" style="height:3px; opacity:0.2"></div>
    </div>
  </div>
</div>

<script>
const vertSrc = `
  attribute vec2 a_pos;
  varying vec2 v_uv;
  void main() {
    v_uv = a_pos * 0.5 + 0.5;
    gl_Position = vec4(a_pos, 0.0, 1.0);
  }
`;

const fragSrc = `
  precision highp float;
  varying vec2 v_uv;
  uniform sampler2D u_tex;
  uniform float u_time;
  uniform float u_intensity;
  uniform vec2 u_res;

  float rand(vec2 co) {
    return fract(sin(dot(co, vec2(12.9898,78.233))) * 43758.5453);
  }

  float noise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    float a = rand(i);
    float b = rand(i + vec2(1,0));
    float c = rand(i + vec2(0,1));
    float d = rand(i + vec2(1,1));
    return mix(mix(a,b,f.x), mix(c,d,f.x), f.y);
  }

  void main() {
    vec2 uv = v_uv;
    float t = u_time;
    float intensity = u_intensity;

    // --- Block displacement ---
    float blockSize = mix(0.05, 0.12, rand(vec2(floor(t * 4.0), 0.5)));
    vec2 blockUv = floor(uv / blockSize) * blockSize;
    float blockRand = rand(blockUv + vec2(t * 0.7));
    float blockRand2 = rand(blockUv + vec2(t * 1.3, 99.0));

    float glitchBand = step(0.94, rand(vec2(floor(uv.y * 30.0), floor(t * 8.0))));
    float glitchBand2 = step(0.97, rand(vec2(floor(uv.y * 80.0), floor(t * 15.0))));

    vec2 offset = vec2(0.0);
    offset.x += (blockRand - 0.5) * 0.08 * intensity * glitchBand;
    offset.x += (blockRand2 - 0.5) * 0.04 * intensity * glitchBand2;

    // --- Scanline roll ---
    float rollSpeed = mod(t * 0.3, 1.0);
    float roll = sin((uv.y + rollSpeed) * 3.14159 * 2.0 * 2.0) * 0.001 * intensity;
    offset.x += roll;

    // --- RGB split / chromatic aberration ---
    float chromaAmt = 0.008 * intensity;
    float chromaBurst = step(0.96, rand(vec2(floor(t*6.0), 1.1))) * 0.02 * intensity;
    float totalChroma = chromaAmt + chromaBurst;

    vec2 uvR = uv + offset + vec2(totalChroma, 0.0);
    vec2 uvG = uv + offset;
    vec2 uvB = uv + offset - vec2(totalChroma, 0.0);

    // flip x for front camera
    uvR.x = 1.0 - uvR.x;
    uvG.x = 1.0 - uvG.x;
    uvB.x = 1.0 - uvB.x;

    float r = texture2D(u_tex, clamp(uvR, 0.0, 1.0)).r;
    float g = texture2D(u_tex, clamp(uvG, 0.0, 1.0)).g;
    float b = texture2D(u_tex, clamp(uvB, 0.0, 1.0)).b;

    vec3 col = vec3(r, g, b);

    // --- Pixelate burst ---
    float pixBurst = step(0.98, rand(vec2(floor(t * 5.0), 3.7)));
    if (pixBurst > 0.5) {
      float ps = 0.03 * intensity;
      vec2 pxUv = floor(uv / ps) * ps;
      pxUv.x = 1.0 - pxUv.x;
      vec3 pixCol = texture2D(u_tex, clamp(pxUv, 0.0, 1.0)).rgb;
      col = mix(col, pixCol, 0.85);
    }

    // --- Vertical tear ---
    float tear = step(0.985, rand(vec2(floor(t * 12.0), 5.2)));
    if (tear > 0.5) {
      float tearY = rand(vec2(floor(t * 12.0), 11.0));
      float tearH = 0.003 + rand(vec2(floor(t * 12.0), 22.0)) * 0.01;
      if (uv.y > tearY && uv.y < tearY + tearH) {
        float dx = (rand(vec2(floor(t * 20.0), 33.0)) - 0.5) * 0.15 * intensity;
        vec2 tUv = vec2(1.0 - clamp(uv.x + dx, 0.0, 1.0), uv.y);
        col = texture2D(u_tex, tUv).rgb;
        col.r += 0.1; col.g -= 0.05;
      }
    }

    // --- Digital noise grain ---
    float grain = rand(uv + vec2(t * 0.01, t * 0.007)) * 0.12 * intensity;
    col += grain - 0.06;

    // --- Horizontal ghost lines ---
    float ghostLine = step(0.993, rand(vec2(floor(uv.y * 500.0), floor(t * 20.0))));
    col += ghostLine * vec3(0.0, 1.0, 0.4) * 0.4 * intensity;

    // --- Phosphor green tint on dark areas ---
    float luma = dot(col, vec3(0.299, 0.587, 0.114));
    vec3 tinted = mix(col, col * vec3(0.7, 1.1, 0.75), (1.0 - luma) * 0.15 * intensity);
    col = mix(col, tinted, 0.5);

    // --- Vhs color bleed ---
    float bleedAmt = 0.003 * intensity;
    vec2 bleedUv = vec2(1.0 - clamp(uv.x + bleedAmt * sin(uv.y * 100.0 + t * 3.0), 0.0, 1.0), uv.y);
    float bleedR = texture2D(u_tex, bleedUv).r;
    col.r = mix(col.r, bleedR, 0.15 * intensity);

    // --- Full frame white flash ---
    float flash = step(0.998, rand(vec2(floor(t * 30.0), 7.0))) * 0.6;
    col += flash;

    // --- Inversion burst (brief) ---
    float inv = step(0.999, rand(vec2(floor(t * 25.0), 8.0)));
    if (inv > 0.5) col = 1.0 - col;

    gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
  }
`;

let gl, program, texLoc, timeLoc, intensityLoc, resLoc;
let videoEl, canvas;
let texture;
let running = false;
let startTime;
let intensity = 1.0;
let targetIntensity = 1.0;

function initAR() {
  document.getElementById('access-screen').style.display = 'none';
  videoEl = document.getElementById('video');
  canvas = document.getElementById('glitch-canvas');

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
    audio: false
  })
  .then(stream => {
    videoEl.srcObject = stream;
    videoEl.play();
    videoEl.addEventListener('loadedmetadata', () => {
      initWebGL();
      startTime = performance.now();
      running = true;
      render();
      startGlitchEvents();
      tryGPS();
    });
  })
  .catch(() => {
    // Try front camera fallback
    navigator.mediaDevices.getUserMedia({ video: true, audio: false })
    .then(stream => {
      videoEl.srcObject = stream;
      videoEl.play();
      videoEl.addEventListener('loadedmetadata', () => {
        initWebGL();
        startTime = performance.now();
        running = true;
        render();
        startGlitchEvents();
        tryGPS();
      });
    })
    .catch(err => {
      document.getElementById('access-screen').style.display = 'flex';
      document.getElementById('access-title').textContent = 'CAM::DENIED';
      document.getElementById('access-sub').textContent = err.message;
    });
  });
}

function initWebGL() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;

  const vs = gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vs, vertSrc);
  gl.compileShader(vs);

  const fs = gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fs, fragSrc);
  gl.compileShader(fs);

  program = gl.createProgram();
  gl.attachShader(program, vs);
  gl.attachShader(program, fs);
  gl.linkProgram(program);
  gl.useProgram(program);

  const quad = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);

  const loc = gl.getAttribLocation(program, 'a_pos');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

  texLoc = gl.getUniformLocation(program, 'u_tex');
  timeLoc = gl.getUniformLocation(program, 'u_time');
  intensityLoc = gl.getUniformLocation(program, 'u_intensity');
  resLoc = gl.getUniformLocation(program, 'u_res');

  texture = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, texture);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    gl.viewport(0, 0, canvas.width, canvas.height);
  });
}

function render() {
  if (!running || !gl) return;
  requestAnimationFrame(render);

  if (videoEl.readyState < 2) return;

  intensity += (targetIntensity - intensity) * 0.05;

  gl.bindTexture(gl.TEXTURE_2D, texture);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, videoEl);

  const t = (performance.now() - startTime) / 1000.0;
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.uniform1i(texLoc, 0);
  gl.uniform1f(timeLoc, t);
  gl.uniform1f(intensityLoc, intensity);
  gl.uniform2f(resLoc, canvas.width, canvas.height);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

function startGlitchEvents() {
  // Random intensity spikes
  setInterval(() => {
    const dice = Math.random();
    if (dice < 0.15) {
      targetIntensity = 2.5 + Math.random() * 1.5;
      setTimeout(() => { targetIntensity = 0.8 + Math.random() * 0.4; }, 150 + Math.random() * 300);
    } else if (dice < 0.3) {
      targetIntensity = 0.2;
      setTimeout(() => { targetIntensity = 1.0; }, 80);
    }
  }, 800);

  // Coords flicker
  setInterval(() => {
    document.getElementById('lat').textContent = (Math.random() * 180 - 90).toFixed(4);
    document.getElementById('lng').textContent = (Math.random() * 360 - 180).toFixed(4);
    document.getElementById('alt').textContent = Math.floor(Math.random() * 999) + 'M';
  }, 2000 + Math.random() * 3000);

  // Status bar text
  const msgs = [
    'SYS::OVERRIDE — SIGNAL COMPROMISED',
    'PERCEPTION_LAYER::CORRUPTED',
    'REALITY_INDEX::0.03',
    'SURFACE::DISSOLVING',
    'SHADER_CORE::ACTIVE',
    'HACK_STATUS::COMPLETE',
    'MEMBRANE::UNSTABLE',
    'GLITCH_ENGINE::v2.4.1',
  ];
  let mi = 0;
  setInterval(() => {
    mi = (mi + 1) % msgs.length;
    document.getElementById('status-bar').textContent = msgs[mi];
  }, 4000);
}

function tryGPS() {
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(pos => {
      document.getElementById('lat').textContent = pos.coords.latitude.toFixed(4);
      document.getElementById('lng').textContent = pos.coords.longitude.toFixed(4);
      document.getElementById('alt').textContent = pos.coords.altitude ? Math.round(pos.coords.altitude) + 'M' : '---M';
    });
  }
}

// Keyboard: +/- to adjust intensity, space for burst
document.addEventListener('keydown', e => {
  if (e.key === '+' || e.key === '=') targetIntensity = Math.min(3.0, targetIntensity + 0.2);
  if (e.key === '-') targetIntensity = Math.max(0.1, targetIntensity - 0.2);
  if (e.key === ' ') {
    targetIntensity = 3.5;
    setTimeout(() => targetIntensity = 1.0, 500);
  }
});

// Touch: tap for burst
document.addEventListener('touchstart', () => {
  targetIntensity = 3.0 + Math.random();
  setTimeout(() => targetIntensity = 1.0, 400);
});
</script>
</body>
</html>
