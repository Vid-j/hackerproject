<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Hacked portal — AR.js + GLSL</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <!-- Synchronous: ES modules can load after the scene inits → shader missing / pink material -->
  <script src="index.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
  <a-scene
    embedded
    arjs="sourceType: webcam; trackingMethod: geo; debugUIEnabled: false;"
    renderer="alpha: true; transparent: true;"
    vr-mode-ui="enabled: false"
  >
    <a-camera gps-camera rotation-reader>
      <a-entity
        geometry="primitive: plane; width: 6; height: 6;"
        position="0 0 -1"
        material="shader: hacker-intervention; transparent: true; opacity: 1; depthTest: false; depthWrite: false; side: double"
      ></a-entity>
    </a-camera>
  </a-scene>
</body>
</html>
